name: Android Build DDTO+
on: [pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Install Haxelibs
        run: |
          haxelib setup ~/haxelib
          haxelib install lime 7.9.0 --quiet
          haxelib install openfl 9.1.0 --quiet
          haxelib install flixel 4.11.0 --quiet
          haxelib install flixel-addons 2.11.0 --quiet
          haxelib install flixel-ui 2.4.0 --quiet
          haxelib install flixel-tools 1.5.1 --quiet
          haxelib install hscript --quiet
          haxelib install hxcpp 4.2.1 --quiet
          haxelib install firetongue --quiet
          haxelib git flxanimate https://github.com/Dot-Stuff/flxanimate 1.2.0 --quiet
          haxelib git extension-webm https://github.com/KadeDev/extension-webm --quiet
          haxelib git linc_luajit https://github.com/nebulazorua/linc_luajit.git --quiet
          haxelib git extension-webview https://github.com/TeamX02/extension-webview.git --quiet

      - name: Patch Code Errors
        run: |
          # Corrige o erro "Reification $ is not allowed" no arquivo de Keybinds
          sed -i 's/\$//g' source/KeyBindSubstate.hx
          # Garante que o diretório de exportação existe
          mkdir -p export/release/android/bin

      - name: Configure Lime
        run: |
          haxelib run lime setup
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_11_X64
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: haxelib run lime build android -64 -release -D lime-threads -w

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DDTO-Plus-Android-Build
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
