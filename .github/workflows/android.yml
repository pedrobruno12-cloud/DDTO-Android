name: Android Build DDTO+
on: [pull_request, workflow_dispatch]

env:
  # Garante compatibilidade com as versões mais recentes do Node no Runner do GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e

      - name: Install Haxelibs
        run: |
          haxelib setup ~/haxelib
          haxelib install lime 7.9.0 --quiet
          haxelib install openfl 9.1.0 --quiet
          haxelib install flixel 4.11.0 --quiet
          haxelib install flixel-addons 2.11.0 --quiet
          haxelib install flixel-ui 2.4.0 --quiet
          haxelib install flixel-tools 1.5.1 --quiet
          haxelib install hscript --quiet
          haxelib install hxcpp 4.2.1 --quiet
          haxelib install firetongue --quiet
          # Bibliotecas do GitHub (Versões específicas para evitar erros de API)
          haxelib git flxanimate https://github.com/Dot-Stuff/flxanimate tags/v1.2.0 --quiet
          haxelib git extension-webm https://github.com/KadeDev/extension-webm --quiet
          haxelib git linc_luajit https://github.com/nebulazorua/linc_luajit.git --quiet
          haxelib git extension-webview https://github.com/TeamX02/extension-webview.git --quiet
          
      - name: Patch Dependencies and Code
        run: |
          # 1. Corrige erro de mouse na flxanimate
          sed -i 's/FlxG.mouse/null/g' ~/haxelib/flxanimate/git/flxanimate/animate/FlxAnim.hx
          
          # 2. Reconstrução total das linhas 99 e 102 no KeyBindSubstate.hx
          # O comando 'c' (change) substitui a linha inteira, eliminando lixo de memória ou caracteres $
          sed -i "99c\                tempText = 'NONE';" source/KeyBindSubstate.hx
          sed -i "102c\                tempText = 'NONE';" source/KeyBindSubstate.hx
          
          # 3. Garante que não existam espaços invisíveis que quebrem o parser do Haxe
          sed -i 's/[[:space:]]*$//' source/KeyBindSubstate.hx
          
          # 4. Debug: Mostra como as linhas ficaram para você conferir no log do GitHub
          echo "--- VERIFICAÇÃO DE SINTAXE ---"
          sed -n '98,104p' source/KeyBindSubstate.hx
          echo "------------------------------"

      - name: Configure Lime
        run: |
          haxelib run lime setup
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        # -64 compila para arquitetura moderna (ARM64) requerida pela Play Store
        # -D FLX_NO_MOUSE desativa interações de mouse que quebram no toque
        run: haxelib run lime build android -64 -release -D lime-threads -D FLX_NO_MOUSE -w

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DDTO-Plus-Android-APK
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
