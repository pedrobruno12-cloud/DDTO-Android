name: Android Build DDTO+
on: [pull_request, workflow_dispatch]

env:
  # Garante compatibilidade com as ações de Node do Runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          # r21e é o padrão de ouro para estabilidade com Lime 7.9.0
          ndk-version: r21e 

      - name: Install Haxelibs
        run: |
          haxelib setup ~/haxelib
          haxelib install lime 7.9.0 --quiet
          haxelib install openfl 9.1.0 --quiet
          haxelib install flixel 4.11.0 --quiet
          haxelib install flixel-addons 2.11.0 --quiet
          haxelib install flixel-ui 2.4.0 --quiet
          haxelib install flixel-tools 1.5.1 --quiet
          haxelib install hscript --quiet
          haxelib install hxcpp 4.2.1 --quiet
          haxelib install firetongue --quiet
          # Bibliotecas específicas do DDTO+
          haxelib git flxanimate https://github.com/Dot-Stuff/flxanimate tags/v1.2.0 --quiet
          haxelib git extension-webm https://github.com/KadeDev/extension-webm --quiet
          haxelib git linc_luajit https://github.com/nebulazorua/linc_luajit.git --quiet
          haxelib git extension-webview https://github.com/TeamX02/extension-webview.git --quiet

      - name: Patch Dependencies and Code
        run: |
          # 1. Resolve erro de mouse na flxanimate
          sed -i 's/FlxG.mouse/null/g' ~/haxelib/flxanimate/git/flxanimate/animate/FlxAnim.hx
          
          # 2. Remove o caractere '$' que causa Reification error no Haxe 4.3+
          sed -i 's/\$//g' source/KeyBindSubstate.hx
          
          # 3. Limpeza CRÍTICA: O erro 'Could not create PCH' é causado por lixo de builds anteriores
          rm -rf export/release/android/obj
          
          # 4. Normaliza quebras de linha (Windows -> Linux)
          sed -i 's/\r//g' source/KeyBindSubstate.hx

      - name: Configure Lime
        run: |
          haxelib run lime setup
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: |
          # O segredo contra 'typeinfo' está nas flags -D HXCPP_CLANG e -D android
          # Elas forçam o compilador a usar o libc++ correto do NDK
          haxelib run lime build android -64 -release \
            -D lime-threads \
            -D FLX_NO_MOUSE \
            -D HXCPP_CLANG \
            -D android \
            -w

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DDTO-Plus-Android-Release
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
